services:
  regex-app:
    build:
      context: ../apps/regex
    restart: unless-stopped
    read_only: true
    environment:
      RESULT_LIMIT: "200"
      REGEX_TIMEOUT_SECONDS: "0.05"
      MAX_PATTERN_LENGTH: "256"
      WORD_LIST_PATH: /app/data/words.txt
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /var/tmp
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - regex-app
    ports:
      - "8080:80"
    volumes:
      - ../infra/nginx/conf.d/regex.conf:/etc/nginx/conf.d/default.conf:ro

  coming-soon:
    build:
      context: ../apps/coming-soon
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "8081:80"
    profiles:
      - oconnell

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    user: "0:0"
    depends_on:
      - coming-soon
    command: tunnel --no-autoupdate run --token-file /run/secrets/cloudflared_token
    secrets:
      - source: cloudflared_token
        target: cloudflared_token
    profiles:
      - oconnell

secrets:
  cloudflared_token:
    file: ./secrets/cloudflared_token.txt
